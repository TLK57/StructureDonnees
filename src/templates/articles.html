<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <title>Articles</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        h1   { border-bottom: 1px solid #ccc; padding-bottom: 10px; }
        ul   { list-style: none; padding: 0; }
        li   { border-bottom: 1px solid #eee; padding: 12px 0; }
        .titre { font-size: 1rem; font-weight: bold; }
        .meta  { font-size: 0.85rem; color: #666; margin-top: 4px; }
    </style>
</head>
<body>

<h1>Derniers articles</h1>

{% if articles %}
<p>{{ articles|length }} article(s) affichés</p>
<ul>
    {% for article in articles %}
    <li>
        <div class="titre">{{ article.title }}</div>
        <div class="meta">{{ article.publication_date }} · {{ article.source_name }}</div>
    </li>
    {% endfor %}
</ul>
{% else %}
<p>Aucun article trouvé dans la base de données.</p>
{% endif %}

</body>
</html>
