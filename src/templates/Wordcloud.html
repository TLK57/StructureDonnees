<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nuage de mots — SD2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #21262d;
      --text:    #e6edf3;
      --muted:   #8b949e;
      --accent:  #58a6ff;
      --amber:   #d29922;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Georgia", serif;
      min-height: 100vh;
      padding: 0 1.5rem 5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      max-width: 960px;
      padding: 2.5rem 0 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 1.2rem;
      animation: fadeDown .4s ease both;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: normal;
      letter-spacing: -.02em;
    }

    .back {
      font-family: "Courier New", monospace;
      font-size: .72rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
    }

    .back:hover { color: var(--accent); }

    .subtitle {
      width: 100%;
      max-width: 960px;
      margin-top: 1rem;
      font-size: .88rem;
      color: var(--muted);
      font-style: italic;
      animation: fadeUp .4s .1s ease both;
    }

    .filters {
      width: 100%;
      max-width: 960px;
      margin-top: 1.8rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem;
      animation: fadeUp .4s .15s ease both;
    }

    .filters form {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      align-items: end;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: .45rem;
    }

    .field label {
      font-size: .85rem;
      color: var(--muted);
    }

    .field input,
    .field select {
      background: #0f141b;
      border: 1px solid var(--border);
      color: var(--text);
      padding: .75rem .9rem;
      border-radius: 6px;
      font-size: .95rem;
      outline: none;
    }

    .field input:focus,
    .field select:focus {
      border-color: var(--accent);
    }

    .actions {
      display: flex;
      align-items: end;
    }

    .btn {
      background: var(--accent);
      color: #0d1117;
      border: none;
      border-radius: 6px;
      padding: .8rem 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: opacity .2s ease;
    }

    .btn:hover {
      opacity: .9;
    }

    .cloud-wrap {
      width: 100%;
      max-width: 960px;
      margin-top: 1.8rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem;
      overflow: hidden;
      animation: fadeUp .4s .2s ease both;
    }

    .cloud-wrap svg {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 4px;
    }

    .empty {
      width: 100%;
      max-width: 960px;
      margin-top: 3rem;
      text-align: center;
      color: var(--muted);
      font-style: italic;
    }

    .error {
      width: 100%;
      max-width: 960px;
      margin-top: 1rem;
      padding: .9rem 1rem;
      background: rgba(210, 153, 34, 0.12);
      border: 1px solid var(--amber);
      border-radius: 6px;
      color: #f2cc60;
    }

    @keyframes fadeDown {
      from { opacity:0; transform:translateY(-10px); }
      to   { opacity:1; transform:translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0); }
    }
  </style>
</head>
<body>

<header>
  <h1>Nuage de mots</h1>
  <a class="back" href="/">← Accueil</a>
</header>

<p class="subtitle">
  Mots les plus fréquents dans les titres des articles stockés en base.
</p>

<div class="filters">
  <form method="GET" action="/wordcloud">
    <div class="field">
      <label for="date_debut">Date début</label>
      <input
              type="date"
              id="date_debut"
              name="date_debut"
              value="{{ request.args.get('date_debut', '') }}"
      >
    </div>

    <div class="field">
      <label for="date_fin">Date fin</label>
      <input
              type="date"
              id="date_fin"
              name="date_fin"
              value="{{ request.args.get('date_fin', '') }}"
      >
    </div>

    <div class="field">
      <label for="nb_mots">Nombre de mots</label>
      <select id="nb_mots" name="nb_mots">
        <option value="10" {% if request.args.get('nb_mots') == '10' %}selected{% endif %}>10</option>
        <option value="20" {% if request.args.get('nb_mots') == '20' %}selected{% endif %}>20</option>
        <option value="30" {% if request.args.get('nb_mots', '30') == '30' %}selected{% endif %}>30</option>
        <option value="50" {% if request.args.get('nb_mots') == '50' %}selected{% endif %}>50</option>
        <option value="100" {% if request.args.get('nb_mots') == '100' %}selected{% endif %}>100</option>
      </select>
    </div>

    <div class="actions">
      <button class="btn" type="submit">Générer</button>
    </div>
  </form>
</div>

{% if erreur %}
<div class="error">{{ erreur }}</div>
{% endif %}

{% if svg %}
<div class="cloud-wrap">
  {{ svg | safe }}
</div>
{% else %}
<p class="empty">Aucun article trouvé pour les critères sélectionnés.</p>
{% endif %}

</body>
</html>
